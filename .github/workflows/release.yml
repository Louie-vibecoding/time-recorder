# Build, test, attest and publish release assets when a version tag is pushed.
# Tag must equal the version in manifest.json (no "v" prefix), e.g. `1.0.1`.
name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write      # create the GitHub release
  id-token: write      # OIDC for artifact attestation
  attestations: write  # store the attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify tag matches manifest version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version=$(node -p "require('./manifest.json').version")
          if [ "$tag" != "$version" ]; then
            echo "Tag ($tag) does not match manifest.json version ($version)" >&2
            exit 1
          fi

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            styles.css

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" manifest.json main.js styles.css \
            --title "$tag" \
            --notes "See CHANGELOG.md for details."
